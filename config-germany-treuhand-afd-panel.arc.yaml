project:
  name: "germany-treuhand-unemployment-afd-panel"
  mode: "full-auto"

research:
  topic: "Treuhandanstalt Deindustrialization and the Rise of the AfD: A 35-Year County-Level Panel Analysis. The Treuhandanstalt privatized approximately 8,000 East German state enterprises between 1990-1994, eliminating millions of industrial jobs. Using publicly available Destatis Regionaldatenbank data (county-level unemployment rates 1990-2024, free API at regionalstatistik.de) and Bundeswahlleiterin election results (AfD vote share by Wahlkreis 2013/2017/2021/2024, free CSV download at bundeswahlleiterin.de), test the hypothesis that counties experiencing the largest and most persistent employment collapse following reunification show systematically higher AfD vote shares today. Key analytical design: (1) Measure peak unemployment by county in 1993-1998 (the Treuhand aftermath period) using Destatis. (2) Measure unemployment persistence: was the 1990s shock temporary or structural? Counties where unemployment remained elevated through 2010 vs those that recovered. (3) Correlate both the magnitude of the 1990s shock AND the persistence of unemployment with AfD vote share in each election 2013-2024. (4) Control for East/West status, urbanization, and current unemployment. The hypothesis is not just 'poverty causes AfD' but 'the specific character of Treuhand-era destruction — sudden, externally imposed, with no democratic input — created a durable grievance that manifests as protest voting.' Compare East German counties with high vs low Treuhand exposure. Data: Destatis Genesis free API (guest access GAST/GAST), Bundeswahlleiterin CSV opendata. No paid API keys required."
  domains:
    - "political-science"
    - "economic-history"
    - "german-studies"
    - "causal-inference"
  daily_paper_count: 15
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 2
  approval_timeout_hours: 24
  retry_limit: 3

notifications:
  channel: "console"
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "anthropic"
  base_url: "https://api.anthropic.com"
  api_key_env: "ANTHROPIC_OAUTHTOKEN"
  primary_model: "claude-sonnet-4-6"
  fallback_models:
    - "claude-haiku-4-5"
    - "qwen/qwen3.5-9b"
    - "openai/gpt-4.1-nano"

  fallback_url: "https://openrouter.ai/api/v1"
  fallback_api_key_env: "OPENROUTER_API_KEY"
  fallback_openrouter_models: []
  temperature: 0.3
  max_tokens: 16000
  timeout: 120
  rate_limit:
    rpm: 5
    tpm: 20000

experiment:
  mode: "sandbox"
  sandbox:
    python_path: ".venv/bin/python"
    timeout: 300
    memory_limit: "4G"
    network: true
  hardware:
    gpu: false

output:
  format: "latex"
  template: "neurips"
  artifacts_dir: "artifacts"
  keep_intermediates: true

literature:
  providers:
    - "openalex"
    - "semantic_scholar"
    - "arxiv"
  max_papers: 50
  min_relevance: 0.6
  verification:
    enabled: true
    check_doi: true
    check_arxiv: true

figures:
  enabled: true
  backend: "matplotlib"
  style: "academic"
  dpi: 300

prompts:
  custom_file: ""
