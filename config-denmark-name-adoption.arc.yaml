project:
  name: "denmark-migration-name-adoption"
  mode: "full-auto"

research:
  topic: "Name Adoption and Labor Market Outcomes Among Second-Generation Immigrants in Denmark: A Regression Discontinuity Analysis. Using Denmark's Statistikbanken (dst.dk) public registry data, investigate whether second-generation immigrants who legally adopt Danish-sounding names experience measurable changes in labor market outcomes. Core design: (1) Identify individuals born in Denmark to immigrant parents (Turkish, Pakistani, Lebanese, Somali, Iraqi cohorts 1975-1995) using public registry name frequency and demographic data. (2) Classify names on a spectrum from heritage (Mohamed, Ahmed, Fatima, Yasmin) to Danish-sounding (Mads, Lars, Mikkel, Sofie). Track legal name changes via Statistikbanken's name change records. (3) Use regression discontinuity around the name change event date — compare employment rates, income, educational attainment before vs after name adoption, with ethnic Danes of matching age/SES as control. (4) Test the signaling hypothesis: does adopting a Danish first name produce measurable labor market gains consistent with reduced discrimination at the resume screening stage? (5) Secondary question: does surname retention or change matter independently of first name? (e.g. Mohamed Jensen vs Mads Al-Rashidi vs Mads Jensen — which combination maximizes labor market outcomes?). Use Statistikbanken API (dst.dk) — free, no-auth JSON/CSV access to Danish name registry, income, employment, education data. Expected finding: if name adoption predicts improved outcomes beyond what parental SES and education explain, this is evidence of persistent labor market discrimination against heritage names in Denmark."
  domains:
    - "economics"
    - "sociology"
    - "migration-studies"
    - "labor-economics"
    - "causal-inference"
  daily_paper_count: 15
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 2
  approval_timeout_hours: 24
  retry_limit: 3

notifications:
  channel: "console"
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "anthropic"
  base_url: "https://api.anthropic.com"
  api_key_env: "ANTHROPIC_OAUTHTOKEN"
  primary_model: "claude-sonnet-4-6"
  fallback_models:
    - "claude-haiku-4-5"
    - "qwen/qwen3.5-9b"
    - "openai/gpt-4.1-nano"

  fallback_url: "https://openrouter.ai/api/v1"
  fallback_api_key_env: "OPENROUTER_API_KEY"
  fallback_openrouter_models: []
  temperature: 0.3
  max_tokens: 16000
  timeout: 120
  rate_limit:
    rpm: 20
    tpm: 80000

experiment:
  mode: "sandbox"
  sandbox:
    python_path: ".venv/bin/python"
    timeout: 300
    memory_limit: "4G"
    network: true
  hardware:
    gpu: false

output:
  format: "latex"
  template: "neurips"
  artifacts_dir: "artifacts"
  keep_intermediates: true

literature:
  providers:
    - "openalex"
    - "semantic_scholar"
    - "arxiv"
  max_papers: 50
  min_relevance: 0.6
  verification:
    enabled: true
    check_doi: true
    check_arxiv: true

figures:
  enabled: true
  backend: "matplotlib"
  style: "academic"
  dpi: 300

prompts:
  custom_file: ""
