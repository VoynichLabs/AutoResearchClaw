project:
  name: "germany-1989-protest-geography-afd"
  mode: "full-auto"

research:
  topic: "1989 Protest Geography and Post-Reunification Political Outcomes in East Germany: Did the Cities That Led the Wende Get Left Behind? Using publicly available data from the Bundeswahlleiterin (federal election results by Wahlkreis, CSV download at bundeswahlleiterin.de), Destatis Regionaldatenbank (regional economic statistics, free API at regionalstatistik.de), and Wikipedia/historical sources (Monday demonstration cities and attendance 1989), test whether East German cities that were geographic centers of the 1989 Friedliche Revolution show different 2024 Bundestagswahl outcomes than comparably-sized East German cities that were NOT protest centers. Key analytical questions: (1) Did 1989 protest cities receive more or less federal Aufbau Ost investment in the 1990s-2000s than non-protest cities of similar size? (Destatis has transfer payment and public investment data by Kreis.) (2) Do 1989 protest cities show higher or lower AfD vote share in 2013/2017/2021/2024? (Bundeswahlleiterin CSV.) (3) Do 1989 protest cities show higher or lower SPD/CDU/Linke vote shares — is the political legacy of civic courage measurable? Protest city list: Leipzig, Dresden, Plauen, Karl-Marx-Stadt (Chemnitz), Rostock, Erfurt, Halle, Jena, Magdeburg. Use crowd size estimates and protest frequency as intensity measure. Compare against size-matched East German cities that had minimal 1989 protest activity. Data sources: all free, no API keys required — Bundeswahlleiterin opendata CSV, Destatis Genesis API (guest access), Wikipedia REST API for historical protest data."
  domains:
    - "political-science"
    - "german-studies"
    - "economic-history"
    - "quantitative-methods"
  daily_paper_count: 15
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 2
  approval_timeout_hours: 24
  retry_limit: 3

notifications:
  channel: "console"
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "anthropic"
  base_url: "https://api.anthropic.com"
  api_key_env: "ANTHROPIC_OAUTHTOKEN"
  primary_model: "claude-sonnet-4-6"
  fallback_models:
    - "claude-haiku-4-5"
    - "qwen/qwen3.5-9b"
    - "openai/gpt-4.1-nano"

  fallback_url: "https://openrouter.ai/api/v1"
  fallback_api_key_env: "OPENROUTER_API_KEY"
  fallback_openrouter_models: []
  temperature: 0.3
  max_tokens: 16000
  timeout: 120
  rate_limit:
    rpm: 5
    tpm: 20000

experiment:
  mode: "sandbox"
  sandbox:
    python_path: ".venv/bin/python"
    timeout: 300
    memory_limit: "4G"
    network: true
  hardware:
    gpu: false

output:
  format: "latex"
  template: "neurips"
  artifacts_dir: "artifacts"
  keep_intermediates: true

literature:
  providers:
    - "openalex"
    - "semantic_scholar"
    - "arxiv"
  max_papers: 50
  min_relevance: 0.6
  verification:
    enabled: true
    check_doi: true
    check_arxiv: true

figures:
  enabled: true
  backend: "matplotlib"
  style: "academic"
  dpi: 300

prompts:
  custom_file: ""
