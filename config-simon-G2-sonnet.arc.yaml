project:
  name: "simon-cohort-G2-sonnet"
  mode: "full-auto"

research:
  topic: "Given Name Cohort Effects on Socioeconomic Outcomes in Denmark: A Registry-Based Analysis of the 'Simon Generation' (1975-1995). Using Denmark's uniquely comprehensive public registry data from Statistics Denmark (Statistikbanken/dst.dk), investigate whether given name popularity cohorts predict aggregate socioeconomic outcomes. Focus on the name 'Simon' which peaked in Danish popularity during 1975-1995, creating a natural cohort of individuals now aged 30-50. Cross-reference name frequency data with publicly available aggregate statistics on education levels, urbanization rates, income brackets, and voting patterns by birth year. Compare the 'Simon cohort' against other peak-name cohorts of the same era (Lars, Morten, Thomas, Martin, Mikkel). Use Statistikbanken API (dst.dk) for all data — it provides free, no-auth JSON/CSV access to Danish demographics, names, education, economics, and elections going back decades. Key analytical question: is the name-outcome correlation a direct effect, or does it reflect parental socioeconomic status (university-educated parents chose 'Simon' at higher rates in the 1980s, which explains downstream correlations)? This is the analytical trap — a good paper identifies the confounding pathway, a bad paper claims names cause outcomes. Also explore: toponymic surnames (-gaard, -borg, -lund) vs patronymic surnames (-sen) and whether surname type predicts different outcome distributions. Denmark's data richness makes this study uniquely feasible — no other country provides this level of publicly accessible, linkable registry data."
  domains:
    - "sociology"
    - "demography"
    - "quantitative-methods"
    - "scandinavian-studies"
  daily_paper_count: 15
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 2
  approval_timeout_hours: 24
  retry_limit: 3

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "anthropic"
  base_url: "https://api.anthropic.com"
  api_key_env: "ANTHROPIC_OAUTHTOKEN"
  primary_model: "claude-sonnet-4-6"
  fallback_models:
    - "claude-haiku-4-5"
    - "qwen/qwen3.5-9b"
    - "openai/gpt-4.1-nano"

  fallback_url: "https://openrouter.ai/api/v1"
  fallback_api_key_env: "OPENROUTER_API_KEY"
  fallback_openrouter_models: []
  temperature: 0.3
  max_tokens: 16000
  timeout: 120
  rate_limit:
    rpm: 5
    tpm: 20000

experiment:
  mode: "sandbox"
  sandbox:
    python_path: ".venv/bin/python"
    timeout: 300
    memory_limit: "4G"
    network: true
  hardware:
    gpu: false

output:
  format: "latex"
  template: "neurips"
  artifacts_dir: "artifacts"
  keep_intermediates: true

literature:
  providers:
    - "openalex"
    - "semantic_scholar"
    - "arxiv"
  max_papers: 50
  min_relevance: 0.6
  verification:
    enabled: true
    check_doi: true
    check_arxiv: true

figures:
  enabled: true
  backend: "matplotlib"
  style: "academic"
  dpi: 300

prompts:
  custom_file: ""
