project:
  name: "denmark-name-surname-matrix"
  mode: "full-auto"

research:
  topic: "First Name × Surname Morphology Interaction Effects on Socioeconomic Outcomes in Denmark: A Predictive Matrix for 2026. Using Denmark's Statistikbanken (dst.dk) public registry data, build a comprehensive matrix of name combinations and their predicted adult socioeconomic outcomes. The core question: does the Simon earnings premium (previously established at +17.1% raw, +7.9% after parental SES adjustment) vary by surname class? Specifically: (1) Classify Danish surnames into morphological categories — patronymic (-sen: Jensen, Nielsen, Hansen, Pedersen) vs toponymic/estate (-gaard, -borg, -lund, -dal, -by, -holm) vs occupational (-smed, -møller) vs foreign/immigrant surnames. (2) Build a name × surname interaction matrix for the top 20 Danish male given names (1975-2000 cohort): Simon, Lars, Morten, Thomas, Martin, Mikkel, Peter, Anders, Søren, Christian, Jacob, Rasmus, Mathias, Oliver, Noah, Emil, William, Magnus, Frederik, Alexander. (3) Test whether 'cross-typed' individuals (high-status first name + -sen surname, e.g. Simon Jensen) have different outcome distributions than 'concordant' individuals (Simon Strandborg) even after controlling for parental education — does name-surname concordance add predictive power beyond each dimension individually? (4) Build a predictive model: using current (2015-2025) Statistikbanken data on which names are disproportionately chosen by university-educated parents, identify the 2026 equivalent of 'Simon' — the names that will be statistically advantageous for children born today reaching adulthood in 2045. Output: a ranked 'optimal name' recommendation matrix for hypothetical Danish offspring in 2026, with confidence intervals. Data sources: Statistikbanken API (navne, uddannelse, indkomst tables), free and no-auth. This builds directly on the Simon cohort confounding paper — extend it to the full name space and make it predictive."
  domains:
    - "sociology"
    - "demography"
    - "quantitative-methods"
    - "scandinavian-studies"
    - "causal-inference"
  daily_paper_count: 15
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 2
  approval_timeout_hours: 24
  retry_limit: 3

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "anthropic"
  base_url: "https://api.anthropic.com"
  api_key_env: "ANTHROPIC_OAUTHTOKEN"
  primary_model: "claude-sonnet-4-6"
  fallback_models:
    - "claude-sonnet-4-6"
    - "x-ai/grok-4.1-fast"
    - "qwen/qwen3.5-9b"
    - "openai/gpt-4.1-nano"
    - "xiaomi/mimo-v2-pro"

  fallback_url: "https://openrouter.ai/api/v1"
  fallback_api_key_env: "OPENROUTER_API_KEY"
  fallback_openrouter_models: []
  temperature: 0.3
  max_tokens: 16000
  timeout: 120
  rate_limit:
    rpm: 5
    tpm: 20000

experiment:
  mode: "sandbox"
  sandbox:
    python_path: ".venv/bin/python"
    timeout: 300
    memory_limit: "4G"
    network: true
  hardware:
    gpu: false

output:
  format: "latex"
  template: "neurips"
  artifacts_dir: "artifacts"
  keep_intermediates: true

literature:
  providers:
    - "openalex"
    - "semantic_scholar"
    - "arxiv"
  max_papers: 50
  min_relevance: 0.6
  verification:
    enabled: true
    check_doi: true
    check_arxiv: true

figures:
  enabled: true
  backend: "matplotlib"
  style: "academic"
  dpi: 300

prompts:
  custom_file: ""
